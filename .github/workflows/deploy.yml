name: CI/CD — Health AI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  # ── Job 1: Lint / syntax check ────────────────────────────────────────────
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install minimal deps for syntax check
        run: pip install pyflakes fastapi pydantic slowapi

      - name: Syntax check
        run: |
          python -m pyflakes api.py
          python -m py_compile graph/graph_builder.py graph/graph_state.py graph/run_pipeline.py
          python -m py_compile nodes/rag_node.py nodes/ingest_and_ocr.py

  # ── Job 2: Deploy backend to Render ───────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # Create this hook in Render dashboard:
        # Service → Settings → Deploy Hooks → Create Hook → copy URL → add as RENDER_DEPLOY_HOOK_URL secret
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook response: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "Warning: Unexpected response $response from Render deploy hook"
          fi

  # ── Job 3: Deploy frontend to Vercel ──────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token=$VERCEL_TOKEN --yes
